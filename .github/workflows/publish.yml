name: Publish Binaries

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: .exe
          - os: ubuntu-latest
            rid: linux-x64
            ext: ''
          - os: macos-latest
            rid: osx-x64
            ext: ''
          - os: macos-latest
            rid: osx-arm64
            ext: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish src/LogicAppQuery/LogicAppQuery.csproj -c Release -r ${{ matrix.rid }} -p:PublishSingleFile=true --self-contained true -o ./publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicAppQuery-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}/LogicAppQuery${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare binaries
        run: |
          mkdir -p release
          cp ./artifacts/LogicAppQuery-win-x64/LogicAppQuery.exe release/LogicAppQuery-win-x64.exe
          cp ./artifacts/LogicAppQuery-linux-x64/LogicAppQuery release/LogicAppQuery-linux-x64
          cp ./artifacts/LogicAppQuery-osx-x64/LogicAppQuery release/LogicAppQuery-osx-x64
          cp ./artifacts/LogicAppQuery-osx-arm64/LogicAppQuery release/LogicAppQuery-osx-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: release/*
          generate_release_notes: true
